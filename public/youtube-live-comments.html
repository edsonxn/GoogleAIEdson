<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de Comentarios en Vivo - YouTube</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
        }

        .ytlc-container {
            max-width: 1600px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px 25px;
            box-sizing: border-box;
        }

        .ytlc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .ytlc-header h1 {
            font-size: 1.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            font-weight: 600;
        }

        .ytlc-header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .ytlc-main {
            display: flex;
            gap: 15px;
            flex: 1;
            overflow: hidden;
        }

        /* Panel de entrada */
        .ytlc-input-panel {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
        }

        .ytlc-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ytlc-input-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        .ytlc-input-group input {
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
        }

        .ytlc-input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .ytlc-button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .ytlc-btn {
            flex: 1;
            padding: 10px 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ytlc-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .ytlc-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ytlc-btn.stop {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
        }

        .ytlc-btn.stop:hover:not(:disabled) {
            background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%);
        }

        /* Panel de comentarios */
        .ytlc-comments-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }

        .ytlc-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .ytlc-stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .ytlc-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
        }

        .ytlc-stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .ytlc-comments-container {
            flex: 1;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow-y: auto;
            padding: 0;
        }

        .ytlc-comments-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
        }

        .ytlc-comment {
            background: rgba(30, 41, 59, 0.6);
            border-left: 3px solid #3b82f6;
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 0.875rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ytlc-comment-author {
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 4px;
        }

        .ytlc-comment-text {
            color: #cbd5e1;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .ytlc-comment-time {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* Estado */
        .ytlc-status {
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 0.875rem;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ytlc-status.connected {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .ytlc-status.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .ytlc-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Estilos del scroll */
        .ytlc-comments-container::-webkit-scrollbar {
            width: 6px;
        }

        .ytlc-comments-container::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.2);
            border-radius: 10px;
        }

        .ytlc-comments-container::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.4);
            border-radius: 10px;
        }

        .ytlc-comments-container::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.6);
        }

        /* Empty state */
        .ytlc-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            text-align: center;
            flex-direction: column;
            gap: 12px;
        }

        .ytlc-empty i {
            font-size: 2rem;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .ytlc-input-panel {
                width: 300px;
            }
        }

        @media (max-width: 768px) {
            body { height: auto; overflow: auto; }
            .ytlc-container {
                height: auto;
                min-height: 100vh;
                padding: 10px;
            }
            .ytlc-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            .ytlc-header h1 {
                font-size: 1.2rem;
            }
            .ytlc-main {
                flex-direction: column;
                overflow: visible;
                gap: 10px;
            }
            .ytlc-input-panel {
                width: 100%;
                max-height: none;
                overflow: visible;
                padding: 12px;
            }
            .ytlc-stats {
                grid-template-columns: 1fr 1fr;
            }
            .ytlc-comments-panel {
                height: 50vh; /* Permite que tenga una altura fija en teléfono y sea auto-scrollable */
                min-height: 400px;
            }
            .btn {
                padding: 12px;
                font-size: 1rem;
            }
            .control-item input[type="text"], 
            .control-item input[type="number"], 
            .control-item select {
                padding: 10px;
                font-size: 1rem;
            }
        }
    
    /* RESPONSIVE TWEAKS */
    @media (max-width: 900px) {
        .dashboard-grid { grid-template-columns: 1fr !important; }
        .dashboard-grid.two-cols { grid-template-columns: 1fr !important; }
        body { padding: 10px !important; }
        header { flex-direction: column; text-align: center; gap: 10px; }
        .connection-panel { flex-direction: column; }
        .connection-panel input, .connection-panel button { width: 100%; margin-bottom: 5px; }
    }

</style>
</head>
<body>
    <div class="ytlc-container">
        <div class="ytlc-header">
            <h1>
                <i class="fas fa-comments"></i>
                Lector de Comentarios en Vivo - YouTube
            </h1>
            <div class="ytlc-header-controls">
                <button class="ytlc-btn" onclick="window.close()" style="background: linear-gradient(135deg, #64748b 0%, #334155 100%); width: auto; padding: 8px 16px;">
                    <i class="fas fa-times"></i> Cerrar
                </button>
            </div>
        </div>

        <div class="ytlc-main">
            <!-- Panel de entrada -->
            <div class="ytlc-input-panel">
                <div style="font-weight: 600; color: #e2e8f0; margin-bottom: 10px;">
                    <i class="fas fa-cog"></i> Configuración
                </div>

                <div class="ytlc-input-group">
                    <label for="videoUrl">URL del Live (YouTube):</label>
                    <input 
                        type="text" 
                        id="videoUrl" 
                        placeholder="https://www.youtube.com/watch?v=..."
                        value="https://www.youtube.com/watch?v="
                    >
                </div>

                <div class="ytlc-input-group">
                    <label for="refreshInterval">Intervalo de actualización (seg):</label>
                    <input 
                        type="number" 
                        id="refreshInterval" 
                        placeholder="3"
                        value="3"
                        min="1"
                        max="60"
                    >
                </div>

                <div class="ytlc-input-group">
                    <label for="maxComments">Máx comentarios a mostrar:</label>
                    <input
                        type="number"
                        id="maxComments"
                        placeholder="100"
                        value="100"
                        min="10"
                        max="1000"
                    >
                </div>

                <div class="ytlc-input-group" style="margin-top: 5px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="enableApplioTTS" style="width: auto; margin: 0; cursor: pointer;">
                        <span><i class="fas fa-headphones"></i> Leer con Voz IA (Applio)</span>
                    </label>
                </div>

                <div class="ytlc-input-group" id="applioOptions" style="display: none; padding-left: 10px; border-left: 2px solid #3b82f6; margin-top: 5px; gap: 8px;">
                    <label for="applioVoiceSelect">Voz Applio:</label>
                    <select id="applioVoiceSelect" style="padding: 8px; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; color: #e2e8f0; font-size: 0.875rem;">
                        <option value="logs\\VOCES\\RemyOriginal.pth">Remy (Por defecto)</option>
                    </select>

                    <label for="maxTtsQueue">Límite en fila de audio:</label>
                    <input type="number" id="maxTtsQueue" value="10" min="1" max="50">

                    <label for="ttsBatchTimer">Esperar (segundos) para juntar msjs:</label>
                    <input type="number" id="ttsBatchTimer" value="3" min="1" max="60">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9em; font-weight: bold; margin-top: 10px;">
                        <input type="checkbox" id="enableContinuousTTS" style="width: auto; margin: 0;" title="No espera segundos. Junta y lee cuando termina el audio.">
                        <span><i class="fas fa-forward"></i> Modo Continuo (Sin espera)</span>
                    </label>
                      <div style="margin-top: 10px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 5px;">
                          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9em; font-weight: bold; color: #a855f7;">
                              <input type="checkbox" id="enableLlmFilter" style="width: auto; margin: 0;">
                              <span><i class="fas fa-magic"></i> Filtro AI Gemini (Secretaria)</span>
                          </label>
                          
                          <div id="llmOptions" style="display: none; flex-direction: column; gap: 5px; margin-top: 5px;">
                              <label for="llmPersona" style="font-size: 0.8em; color: #cbd5e1;">Personalidad y contexto:</label>
                              <textarea id="llmPersona" rows="3" style="background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; color: #e2e8f0; font-size: 0.8rem; padding: 4px; width: 100%;">Eres mi asistente IA carismática leyendo los comentarios de mi stream. Aborda TODOS los mensajes que te lleguen, leyéndolos y reaccionando a cada uno de forma fluida. Si llegan muchos al mismo tiempo, agrúpalos pero asegúrate de mencionar qué dijo cada quien. No uses frases automáticas como "aquí está el resumen".</textarea>
                          </div>
                      </div>
                    
                    <div style="font-size: 0.75rem; color: #94a3b8; display: flex; align-items: center; gap: 5px;">
                        <span>En fila:</span> <strong id="ttsQueueCount" style="color: #3b82f6;">0</strong>
                        <button id="clearTtsQueueBtn" style="margin-left: auto; background: none; border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 0.7rem;">
                            Limpiar
                        </button>
                    </div>
                </div>

                <div class="ytlc-button-group">
                    <button class="ytlc-btn" id="startBtn" onclick="window.startReadingComments()">
                        <i class="fas fa-play"></i> Iniciar
                    </button>
                    <button class="ytlc-btn stop" id="stopBtn" onclick="window.stopReadingComments()" disabled>
                        <i class="fas fa-stop"></i> Detener
                    </button>
                </div>

                <div class="ytlc-status" id="status">
                    <span class="ytlc-status-dot"></span>
                    <span>Listo para conectar</span>
                </div>

                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <div style="font-weight: 600; color: #e2e8f0; margin-bottom: 10px;">
                        <i class="fas fa-info-circle"></i> Información
                    </div>
                    <div style="font-size: 0.8rem; color: #94a3b8; line-height: 1.5;">
                        <p>✓ Lee comentarios en tiempo real</p>
                        <p>✓ Se actualiza automáticamente</p>
                        <p>✓ Soporta lives activos</p>
                    </div>
                </div>
            </div>

            <!-- Panel de comentarios -->
            <div class="ytlc-comments-panel">
                <!-- Estadísticas -->
                <div class="ytlc-stats">
                    <div class="ytlc-stat-card">
                        <div class="ytlc-stat-value" id="totalComments">0</div>
                        <div class="ytlc-stat-label">Total Comentarios</div>
                    </div>
                    <div class="ytlc-stat-card">
                        <div class="ytlc-stat-value" id="uniqueUsers">0</div>
                        <div class="ytlc-stat-label">Usuarios Únicos</div>
                    </div>
                    <div class="ytlc-stat-card">
                        <div class="ytlc-stat-value" id="commentsPerMin">0</div>
                        <div class="ytlc-stat-label">Comentarios/Min</div>
                    </div>
                </div>

                <!-- Contenedor de comentarios -->
                <div class="ytlc-comments-container">
                    <div class="ytlc-comments-list" id="commentsList">
                        <div class="ytlc-empty">
                            <i class="fas fa-comment-slash"></i>
                            <div>Presiona "Iniciar" para leer comentarios del live</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="youtube-live-comments.js"></script>
</body>
</html>
